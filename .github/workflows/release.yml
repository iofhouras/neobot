name: Build & Release NeoBot

on:
  push:
    tags:
      - 'v*.*.*'          # Trigger on version tags (e.g. v0.1.0)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write        # Required to create releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - AppImage (portable) + .deb
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: 'appimage,deb'
            artifact_name: 'NeoBot-Linux'

          # Windows - NSIS Installer (.exe)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: 'nsis'
            artifact_name: 'NeoBot-Windows'

          # macOS - Universal DMG (Apple Silicon + Intel)
          - os: macos-latest
            target: universal-apple-darwin
            bundle: 'dmg'
            artifact_name: 'NeoBot-macOS'

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --force

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App
        run: cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundle }} --verbose

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.target }}/release/bundle/**
            target/${{ matrix.target }}/release/*.exe
            target/${{ matrix.target }}/release/*.dmg
            target/${{ matrix.target }}/release/*.AppImage
            target/${{ matrix.target }}/release/*.deb
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NeoBot ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: |
            artifacts/NeoBot-Linux/**/*.AppImage
            artifacts/NeoBot-Linux/**/*.deb
            artifacts/NeoBot-Windows/**/*.exe
            artifacts/NeoBot-macOS/**/*.dmg
          generate_release_notes: true
          body: |
            ## NeoBot ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Size |
            |----------|------|------|
            | Linux    | NeoBot-*.AppImage + .deb | ~45 MB |
            | Windows  | NeoBot-Setup.exe (NSIS)  | ~52 MB |
            | macOS    | NeoBot.dmg (Universal)   | ~48 MB |

            **Full changelog and installation instructions** in the [README](https://github.com/iofhouras/neobot#readme).

            > Built automatically with GitHub Actions on ${{ runner.os }}.
